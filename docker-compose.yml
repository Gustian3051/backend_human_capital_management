services:
  postgres:
    image: postgres:17
    container_name: hcm-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hcm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: hcm-redis
    restart: always
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: hcm-minio
    command: server /data --console-address ":9001"
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  backend:
    build: .
    container_name: hcm-backend
    restart: always
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "8080:8080"
    env_file:
      - .env.docker

volumes:
  postgres_data:
  minio_data: